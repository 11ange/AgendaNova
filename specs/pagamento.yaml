title: Pagamento
type: object
description: "Registro financeiro de uma sessão ou pacote de treinamentos"
required:
  - treinamentoId
  - pacienteId
  - formaPagamento
  - status
  - dataPagamento
properties:
  id:
    type: string
    description: "ID do documento no Firestore"
  treinamentoId:
    type: string
    description: "Referência ao ID do agendamento ou pacote de treinamento"
  pacienteId:
    type: string
    description: "Referência ao ID do paciente"
  formaPagamento:
    type: string
    enum: [Dinheiro, Pix, Convenio]
  tipoParcelamento:
    type: string
    nullable: true
    description: "Ex: 'Por sessão', '3x'"
  status:
    type: string
    enum: [Pendente, Realizado]
  dataPagamento:
    type: string
    format: date-time
    description: "Data da transação (Timestamp no Firestore)"
  observacoes:
    type: string
    nullable: true
  guiaConvenio:
    type: string
    nullable: true
    description: "Número da guia de autorização, se aplicável"
  dataEnvioGuia:
    type: string
    format: date-time
    nullable: true
    description: "Data em que a guia foi enviada ao convênio"
  parcelaNumero:
    type: integer
    minimum: 1
    nullable: true
  totalParcelas:
    type: integer
    minimum: 1
    nullable: true
  dataRecebimentoConvenio:
    type: string
    format: date-time
    nullable: true
    description: "Data em que o valor foi efetivamente repassado pelo convênio"